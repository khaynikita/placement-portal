<div class="post-job-container">

  <h2>Create Job</h2>

  <input
    type="text"
    placeholder="Title"
    [(ngModel)]="jobData.title"
  >

  <input
    type="text"
    placeholder="Company"
    [(ngModel)]="jobData.companyName"
  >

  <button (click)="createJob()">
    Create Job
  </button>

</div>
