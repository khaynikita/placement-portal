<div class="applicants-container">

  <h2>Applicants</h2>

  <div
    class="applicant-card"
    *ngFor="let applicant of applicants"
  >

    <div class="left">
      <img src="https://i.pravatar.cc/50" class="avatar" />
      <div>
        <h3>{{ applicant.studentName }}</h3>
        <p>{{ applicant.jobTitle }} · {{ applicant.companyName }}</p>
        <p>{{ applicant.email }} · {{ applicant.phone }}</p>
        <p>
          <span
            class="skill"
            *ngFor="let skill of applicant.skills"
          >
            {{ skill }}
          </span>
        </p>
      </div>
    </div>

    <div class="right">
      <a
        class="view-btn"
        [href]="applicant.resumeUrl"
        target="_blank"
      >
        Resume
      </a>
      <button
        class="shortlist-btn"
        type="button"
        (click)="updateStatus(applicant.id, 'SHORTLISTED')"
      >
        Shortlist
      </button>
      <button
        class="reject-btn"
        type="button"
        (click)="updateStatus(applicant.id, 'REJECTED')"
      >
        Reject
      </button>
      <button
        class="offer-btn"
        type="button"
        (click)="updateStatus(applicant.id, 'OFFERED')"
      >
        Offer
      </button>
    </div>

  </div>

</div>
