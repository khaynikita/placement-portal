<div class="analytics-page" *ngIf="analytics() as data">
  <div class="header">
    <h2>Placement Analytics</h2>
    <button type="button" (click)="exportReport()">Export Report</button>
  </div>

  <div class="kpis">
    <div><strong>{{ data.totalStudents }}</strong><span>Total Students</span></div>
    <div><strong>{{ data.placed }}</strong><span>Placed</span></div>
    <div><strong>{{ data.placementRate }}%</strong><span>Placement Rate</span></div>
  </div>

  <section class="chart-card">
    <h3>Application Funnel</h3>
    <div class="bar" *ngFor="let item of data.applicationFunnel | keyvalue">
      <span>{{ item.key }}</span>
      <div><i [style.width.%]="item.value"></i></div>
      <strong>{{ item.value }}</strong>
    </div>
  </section>

  <section class="chart-card">
    <h3>Top Companies</h3>
    <div class="bar" *ngFor="let item of data.topCompanies | keyvalue">
      <span>{{ item.key }}</span>
      <div><i [style.width.%]="item.value * 10"></i></div>
      <strong>{{ item.value }}</strong>
    </div>
  </section>
</div>
