<div class="applications-container">

  <h2>My Applications</h2>

  <div
    class="application-card"
    *ngFor="let application of applications"
  >

    <p>
      <strong>Job ID:</strong>
      {{ application.jobId }}
    </p>

    <p>
      <strong>Status:</strong>
      {{ application.status }}
    </p>

    <p>
      <strong>Applied At:</strong>
      {{ application.appliedAt }}
    </p>

  </div>

</div>
